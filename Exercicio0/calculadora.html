<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Calculadora Back end</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
</head>
<body>
    <h2>Calculadora Back-end</h2>
    <input type="number" id="num1" placeholder="Digite o primeiro número"/>
    <input type="number" id="num2" placeholder="Digite o segundo número"/>
    <select id="operacao">
        <option value="soma">Soma (+)</option>
        <option value="subtracao">Subtração (-)</option>
        <option value="multiplicacao">Multiplicação (*)</option>
        <option value="divisao">Divisão (/)</option>
    </select>
    <button onclick="calcular()">Calcular via Back-end</button>
    <p>Resultado: <span id="resultado"></span></p>

    <script>
        //Usar o comando async para transformar o fetch em assíncrono,
        //ou seja, vai ser executado a qualquer momento
        //Quando usamos o async precisamos usar o await na função que
        //desejamos esperar 
        async function calcular() {
            //Recuperar os valores informados nos inputs
            const n1 = document.getElementById("num1").value;
            const n2 = document.getElementById("num2").value;
            const operacao = document.getElementById("operacao").value;

            //Referência para o span onde será exibido o resultado
            const spanResultado = document.getElementById("resultado");

            //Bloco para verificar ocorrência de erros
            try{
                //Fazer a requisição ao back end usando o fetch
                //A resposta do back end será armazenada no const
                const resposta = await
                    fetch("http://localhost:3000/calcular/"+ n1 +"/" +n2 + "/" + operacao);
                //A resposta vem como texto (String) precisamos
                //converter para JSON
                const dados = await resposta.json();
                //Exibir o valor do atributo "resultado" do JSON
                spanResultado.innerText = dados.resultado;
            } catch (erro){
                console.log("Erro ao acessar back end");
                console.error("ERRO: ", erro);
                spanResultado.innerText = "Erro ao calcular";
            }
            
        }

    </script>
</body>
</html>
