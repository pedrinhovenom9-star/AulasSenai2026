<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div#area {
            font: normal 20pt Arial;
            background: rgb(117, 177, 221);
            color: yellow;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>

</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()">
        vamos interagir!
    </div>
    <script>
            var a = window.document.getElementById('area')
        function clicar(){
            a.innerText = "clicou"
            a.style.background = "black"
            a.style.color = "white"
        }
        function entrar(){
            a.innerText = "entrou"
            a.style.background = "red"
            a.style.color = "blue"
        
        }
        function sair(){
            a.innerText = "saiu"
            a.style.background = "pink"
            a.style.color = "black"
        }
    </script>
</body>
</html>
