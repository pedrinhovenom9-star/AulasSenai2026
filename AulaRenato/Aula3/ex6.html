<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventos do DOM</title>
  </head>
  <body>
    <h1>Somando dois numeros</h1>
    <input type="number" name="txtn1" id="txtn1" />
    <input type="number" name="txtn2" id="txtn2" />
    <input type="button" value="Somar" onclick="somar()" />
    <div id="rest">Resultado</div>

    <script>
      function somar() {
        var n1 = window.document.getElementById('txtn1');
        var n2 = window.document.getElementById('txtn2');
        n1 = Number(n1.value);
        n2 = Number(n2.value);
        var rest = window.document.getElementById('rest');
        var soma = Number(n1) + Number(n2);

        rest.innerText = 'A soma é ' + soma;
      }
    </script>
  </body>
</html>
